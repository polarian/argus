name: release

# Build per-platform `arg` binaries and attach them to the GitHub Release on each
# `v*` tag. Assets use the common `arg-<version>-<os>-<arch>` convention
# (e.g. arg-0.1.2-darwin-arm64.tar.gz); install.sh resolves the latest tag first.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # taiki-e/upload-rust-binary-action uploads to an existing release, so create it
  # first (idempotent — safe on re-runs). github.ref_name/github.repository are
  # trusted contexts, passed via env per Actions injection guidance.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes

  upload:
    needs: create-release
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            slug: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            slug: darwin-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            slug: linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            slug: linux-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Resolve version (tag without leading v)
        env:
          TAG: ${{ github.ref_name }}
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: arg
          target: ${{ matrix.target }}
          archive: arg-${{ env.VERSION }}-${{ matrix.slug }}   # e.g. arg-0.1.2-darwin-arm64
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish the crate to crates.io after the release binaries are up (so a
  # published version always has matching binstall assets). Needs CRATES_IO_TOKEN.
  publish-crate:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
